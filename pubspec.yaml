name: kocaelispor_1966_mobil
description: Kocaelispor Taraftar Uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  google_sign_in: ^6.1.5
  font_awesome_flutter: ^10.8.0
  cupertino_icons: ^1.0.8
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.1
  firebase_analytics: ^10.10.7
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  flutter_localizations: # ✅ YENİ EKLEME - Çoklu dil desteği
    sdk: flutter
  intl: 0.20.2  # ✅ YENİ EKLEME - Dil formatları için

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

# ✅ YENİ EKLEME - Dil dosyaları için
flutter:
  generate: true
  assets:
    - assets/images/stadium_bg.png
    - assets/images/avatar_placeholder.png
  uses-material-design: true